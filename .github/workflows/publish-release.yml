name: Publish Release

on:
  push:
    branches:
      - main
    paths:
      - CHANGELOG.md
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup workspace
        uses: ./.github/actions/setup-monorepo

      - name: Resolve release version
        id: metadata
        shell: bash
        run: |
          version="$(node -p 'JSON.parse(require("fs").readFileSync("package.json", "utf8")).version')"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Render release notes
        run: pnpm release:notes > release-notes.md

      - name: Check whether release already exists
        id: existing
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ steps.metadata.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub release
        if: steps.existing.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh release create "v${{ steps.metadata.outputs.version }}"
          --target "${{ github.sha }}"
          --title "v${{ steps.metadata.outputs.version }}"
          --notes-file release-notes.md
