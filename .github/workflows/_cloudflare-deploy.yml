name: Cloudflare Deploy Reusable

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      scope:
        required: false
        default: ""
        type: string
      apps:
        required: false
        default: ""
        type: string
      version:
        required: false
        default: ""
        type: string
      git_sha:
        required: false
        default: ""
        type: string
    secrets:
      CLOUDFLARE_ACCOUNT_ID:
        required: true
      CLOUDFLARE_API_TOKEN:
        required: true

permissions:
  contents: read

concurrency:
  group: cloudflare-${{ inputs.environment }}-${{ inputs.scope != '' && inputs.scope || github.ref_name }}
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      app_matrix: ${{ steps.app_matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup workspace
        uses: ./.github/actions/setup-monorepo

      - name: Build deploy matrix
        id: app_matrix
        shell: bash
        run: |
          args=(--group app-workers)
          if [ -n "${{ inputs.apps }}" ]; then
            args+=(--apps "${{ inputs.apps }}")
          fi
          matrix="$(pnpm cloudflare:matrix -- "${args[@]}")"
          {
            echo "matrix<<EOF"
            echo "$matrix"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  deploy-app-workers:
    needs: discover
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: ${{ inputs.environment }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.app_matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup workspace
        uses: ./.github/actions/setup-monorepo

      - name: Deploy application worker
        shell: bash
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          args=(--environment "${{ inputs.environment }}" --app "${{ matrix.slug }}")
          if [ -n "${{ inputs.scope }}" ]; then
            args+=(--scope "${{ inputs.scope }}")
          fi
          if [ -n "${{ inputs.version }}" ]; then
            args+=(--version "${{ inputs.version }}")
          fi
          if [ -n "${{ inputs.git_sha }}" ]; then
            args+=(--git-sha "${{ inputs.git_sha }}")
          fi
          pnpm cloudflare:deploy -- "${args[@]}"

  deploy-gateway:
    needs:
      - discover
      - deploy-app-workers
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup workspace
        uses: ./.github/actions/setup-monorepo

      - name: Deploy gateway worker
        shell: bash
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          args=(--environment "${{ inputs.environment }}" --app gateway)
          if [ -n "${{ inputs.scope }}" ]; then
            args+=(--scope "${{ inputs.scope }}")
          fi
          if [ -n "${{ inputs.version }}" ]; then
            args+=(--version "${{ inputs.version }}")
          fi
          if [ -n "${{ inputs.git_sha }}" ]; then
            args+=(--git-sha "${{ inputs.git_sha }}")
          fi
          pnpm cloudflare:deploy -- "${args[@]}"
